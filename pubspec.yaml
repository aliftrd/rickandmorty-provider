name: rickandmorty
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  # Dependency injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # CodeGen
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Path provider
  path_provider: ^2.1.5

  # Routing
  auto_route: ^11.1.0

  # State management
  provider: ^6.1.5+1

  # Network
  http: ^1.6.0

  # UI
  skeletonizer: ^2.1.3
  cached_network_image: ^3.4.1

  # Utils
  logger: ^2.7.0
  fpdart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  injectable_generator: ^3.0.2
  auto_route_generator: ^10.5.0

flutter:
  uses-material-design: true

